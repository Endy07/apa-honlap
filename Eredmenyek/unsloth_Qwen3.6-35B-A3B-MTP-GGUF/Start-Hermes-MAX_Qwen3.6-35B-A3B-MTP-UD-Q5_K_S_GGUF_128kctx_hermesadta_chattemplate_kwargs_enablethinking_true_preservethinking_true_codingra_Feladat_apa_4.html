  "code": "<!DOCTYPE html>\n<html lang=\"hu\" data-theme=\"classical-gold\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Kárai Mihály — Festőművész</title>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link href=\"https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap\" rel=\"stylesheet\">\n<style>\n/* ═══════════════════════════════════════════════════\n   THEME SYSTEM — 7 HARMONIOUS PALETTES\n   60-30-10 COLOR RULE APPLIED TO EACH\n   ═══════════════════════════════════════════════════ */\n\n[data-theme=\"classical-gold\"] {\n  --bg-primary: #1a1410;\n  --bg-secondary: #2a2018;\n  --bg-tertiary: #3a2e22;\n  --text-primary: #f5efe6;\n  --text-secondary: #c4b49a;\n  --text-muted: #8a7a64;\n  --accent: #c8a45a;\n  --accent-light: #e8d5a0;\n  --accent-dark: #9a7a3a;\n  --overlay: rgba(26,20,16,0.85);\n  --card-bg: rgba(42,32,24,0.7);\n  --border: rgba(200,164,90,0.2);\n  --gradient-hero: linear-gradient(135deg, #1a1410 0%, #2a2018 50%, #1a1410 100%);\n  --texture-overlay: url(\"data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c8a45a' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E\");\n  --brush-stroke: rgba(200,164,90,0.15);\n  --shadow: 0 20px 60px rgba(0,0,0,0.4);\n  --glow: 0 0 40px rgba(200,164,90,0.1);\n}\n\n[data-theme=\"oil-painting\"] {\n  --bg-primary: #f5f0e8;\n  --bg-secondary: #ebe3d5;\n  --bg-tertiary: #d4c8b4;\n  --text-primary: #3a2e22;\n  --text-secondary: #6a5a44;\n  --text-muted: #9a8a74;\n  --accent: #8b4513;\n  --accent-light: #c47a4a;\n  --accent-dark: #5a2d0a;\n  --overlay: rgba(245,240,232,0.9);\n  --card-bg: rgba(255,255,255,0.6);\n  --border: rgba(139,69,19,0.2);\n  --gradient-hero: linear-gradient(135deg, #f5f0e8 0%, #ebe3d5 50%, #f5f0e8 100%);\n  --texture-overlay: url(\"data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E\");\n  --brush-stroke: rgba(139,69,19,0.1);\n  --shadow: 0 20px 60px rgba(58,46,34,0.12);\n  --glow: 0 0 40px rgba(139,69,19,0.08);\n}\n\n[data-theme=\"ocean-deep\"] {\n  --bg-primary: #0d1b2a;\n  --bg-secondary: #1b2838;\n  --bg-tertiary: #243447;\n  --text-primary: #e0e8f0;\n  --text-secondary: #8899aa;\n  --text-muted: #556677;\n  --accent: #4a90a4;\n  --accent-light: #7ab8cc;\n  --accent-dark: #2a6074;\n  --overlay: rgba(13,27,42,0.88);\n  --card-bg: rgba(27,40,56,0.7);\n  --border: rgba(74,144,164,0.2);\n  --gradient-hero: linear-gradient(135deg, #0d1b2a 0%, #1b2838 50%, #0d1b2a 100%);\n  --texture-overlay: url(\"data:image/svg+xml,%3Csvg width='200' height='200' viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.03' numOctaves='3'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E\");\n  --brush-stroke: rgba(74,144,164,0.12);\n  --shadow: 0 20px 60px rgba(0,0,0,0.5);\n  --glow: 0 0 40px rgba(74,144,164,0.1);\n}\n\n[data-theme=\"spring-bloom\"] {\n  --bg-primary: #f0f7f0;\n  --bg-secondary: #e4f0e4;\n  --bg-tertiary: #d0e4d0;\n  --text-primary: #2a3a2a;\n  --text-secondary: #5a6a5a;\n  --text-muted: #8a9a8a;\n  --accent: #5a8a5a;\n  --accent-light: #8ab88a;\n  --accent-dark: #3a6a3a;\n  --overlay: rgba(240,247,240,0.9);\n  --card-bg: rgba(255,255,255,0.55);\n  --border: rgba(90,138,90,0.2);\n  --gradient-hero: linear-gradient(135deg, #f0f7f0 0%, #e4f0e4 50%, #f0f7f0 100%);\n  --texture-overlay: url(\"data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%235a8a5a' fill-opacity='0.04'%3E%3Ccircle cx='40' cy='40' r='2'/%3E%3Ccircle cx='20' cy='20' r='1.5'/%3E%3Ccircle cx='60' cy='60' r='1.5'/%3E%3C/g%3E%3C/svg%3E\");\n  --brush-stroke: rgba(90,138,90,0.1);\n  --shadow: 0 20px 60px rgba(42,58,42,0.1);\n  --glow: 0 0 40px rgba(90,138,90,0.08);\n}\n\n[data-theme=\"sunset-ember\"] {\n  --bg-primary: #1e1218;\n  --bg-secondary: #2a1a22;\n  --bg-tertiary: #3a2430;\n  --text-primary: #f0e0e8;\n  --text-secondary: #b090a0;\n  --text-muted: #7a6070;\n  --accent: #d4706a;\n  --accent-light: #e8a09a;\n  --accent-dark: #a44040;\n  --overlay: rgba(30,18,24,0.88);\n  --card-bg: rgba(42,26,34,0.7);\n  --border: rgba(212,112,106,0.2);\n  --gradient-hero: linear-gradient(135deg, #1e1218 0%, #2a1a22 50%, #1e1218 100%);\n  --texture-overlay: url(\"data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23d4706a' fill-opacity='0.03'%3E%3Cpath d='M60 0L60 120M0 60L120 60M20 20L100 100M100 20L20 100'/%3E%3C/g%3E%3C/svg%3E\");\n  --brush-stroke: rgba(212,112,106,0.12);\n  --shadow: 0 20px 60px rgba(0,0,0,0.5);\n  --glow: 0 0 40px rgba(212,112,106,0.1);\n}\n\n[data-theme=\"monochrome\"] {\n  --bg-primary: #111111;\n  --bg-secondary: #1a1a1a;\n  --bg-tertiary: #222222;\n  --text-primary: #f0f0f0;\n  --text-secondary: #999999;\n  --text-muted: #666666;\n  --accent: #cccccc;\n  --accent-light: #e0e0e0;\n  --accent-dark: #888888;\n  --overlay: rgba(17,17,17,0.9);\n  --card-bg: rgba(26,26,26,0.8);\n  --border: rgba(204,204,204,0.15);\n  --gradient-hero: linear-gradient(135deg, #111111 0%, #1a1a1a 50%, #111111 100%);\n  --texture-overlay: url(\"data:image/svg+xml,%3Csvg width='4' height='4' viewBox='0 0 4 4' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 3h1v1H1V3zm2-2h1v1H3V1z' fill='%23ffffff' fill-opacity='0.03' fill-rule='evenodd'/%3E%3C/svg%3E\");\n  --brush-stroke: rgba(204,204,204,0.08);\n  --shadow: 0 20px 60px rgba(0,0,0,0.6);\n  --glow: 0 0 40px rgba(204,204,204,0.05);\n}\n\n[data-theme=\"lavender-dusk\"] {\n  --bg-primary: #1a1520;\n  --bg-secondary: #221a2a;\n  --bg-tertiary: #2e2438;\n  --text-primary: #e8e0f0;\n  --text-secondary: #a898b8;\n  --text-muted: #786888;\n  --accent: #9a7abf;\n  --accent-light: #c0a8e0;\n  --accent-dark: #6a4a8f;\n  --overlay: rgba(26,21,32,0.88);\n  --card-bg: rgba(34,26,42,0.7);\n  --border: rgba(154,122,191,0.2);\n  --gradient-hero: linear-gradient(135deg, #1a1520 0%, #221a2a 50%, #1a1520 100%);\n  --texture-overlay: url(\"data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%239a7abf' fill-opacity='0.03'%3E%3Cpath d='M30 0C30 16.57 16.57 30 0 30C16.57 30 30 43.43 30 60C30 43.43 43.43 30 60 30C43.43 30 30 16.57 30 0z'/%3E%3C/g%3E%3C/svg%3E\");\n  --brush-stroke: rgba(154,122,191,0.12);\n  --shadow: 0 20px 60px rgba(0,0,0,0.4);\n  --glow: 0 0 40px rgba(154,122,191,0.1);\n}\n\n/* ═══════════════════════════════════════════════════\n   RESET & BASE\n   ═══════════════════════════════════════════════════ */\n*, *::before, *::after {\n  margin: 0;\n  padding: 0;\n  box-sizing: border-box;\n}\n\nhtml {\n  scroll-behavior: smooth;\n  font-size: 16px;\n  overflow-x: hidden;\n}\n\nbody {\n  font-family: 'Cormorant Garamond', 'Georgia', serif;\n  background: var(--bg-primary);\n  color: var(--text-primary);\n  line-height: 1.7;\n  overflow-x: hidden;\n  transition: background 0.8s ease, color 0.8s ease;\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n}\n\n::selection {\n  background: var(--accent);\n  color: var(--bg-primary);\n}\n\n::-webkit-scrollbar {\n  width: 8px;\n}\n\n::-webkit-scrollbar-track {\n  background: var(--bg-secondary);\n}\n\n::-webkit-scrollbar-thumb {\n  background: var(--accent-dark);\n  border-radius: 4px;\n}\n\n::-webkit-scrollbar-thumb:hover {\n  background: var(--accent);\n}\n\na {\n  color: var(--accent);\n  text-decoration: none;\n  transition: color 0.3s ease;\n}\n\na:hover {\n  color: var(--accent-light);\n}\n\nimg {\n  max-width: 100%;\n  height: auto;\n  display: block;\n}\n\n/* ═══════════════════════════════════════════════════\n   TEXTURE OVERLAY (applied globally)\n   ═══════════════════════════════════════════════════ */\nbody::before {\n  content: '';\n  position: fixed;\n  top: 0;\n  left: 0;\n  width: 100%;\n  height: 100%;\n  background: var(--texture-overlay);\n  pointer-events: none;\n  z-index: 9999;\n  mix-blend-mode: overlay;\n}\n\n/* ═══════════════════════════════════════════════════\n   LOADING SCREEN\n   ═══════════════════════════════════════════════════ */\n.loader {\n  position: fixed;\n  top: 0;\n  left: 0;\n  width: 100%;\n  height: 100%;\n  background: var(--bg-primary);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  flex-direction: column;\n  z-index: 99999;\n  transition: opacity 0.8s ease, visibility 0.8s ease;\n}\n\n.loader.hidden {\n  opacity: 0;\n  visibility: hidden;\n}\n\n.loader-brush {\n  width: 60px;\n  height: 60px;\n  position: relative;\n}\n\n.loader-brush::before {\n  content: '';\n  position: absolute;\n  width: 100%;\n  height: 100%;\n  border: 2px solid var(--accent);\n  border-radius: 50%;\n  animation: loaderPulse 1.5s ease-in-out infinite;\n}\n\n.loader-brush::after {\n  content: '';\n  position: absolute;\n  top: 50%;\n  left: 50%;\n  width: 4px;\n  height: 30px;\n  background: var(--accent);\n  transform: translate(-50%, -50%);\n  animation: loaderStroke 1.5s ease-in-out infinite;\n}\n\n@keyframes loaderPulse {\n  0%, 100% { transform: scale(0.8); opacity: 0.3; }\n  50% { transform: scale(1.2); opacity: 1; }\n}\n\n@keyframes loaderStroke {\n  0%, 100% { transform: translate(-50%, -50%) rotate(-15deg); }\n  50% { transform: translate(-50%, -50%) rotate(15deg); }\n}\n\n.loader-text {\n  margin-top: 30px;\n  font-family: 'Playfair Display', serif;\n  font-size: 1rem;\n  letter-spacing: 4px;\n  text-transform: uppercase;\n  color: var(--text-secondary);\n  animation: loaderFade 1.5s ease-in-out infinite;\n}\n\n@keyframes loaderFade {\n  0%, 100% { opacity: 0.3; }\n  50% { opacity: 1; }\n}\n\n/* ═══════════════════════════════════════════════════\n   NAVIGATION\n   ═══════════════════════════════════════════════════ */\n.nav {\n  position: fixed;\n  top: 0;\n  left: 0;\n  width: 100%;\n  z-index: 1000;\n  padding: 20px 40px;\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  transition: all 0.5s ease;\n  background: transparent;\n}\n\n.nav.scrolled {\n  background: var(--overlay);\n  backdrop-filter: blur(20px);\n  -webkit-backdrop-filter: blur(20px);\n  padding: 12px 40px;\n  border-bottom: 1px solid var(--border);\n}\n\n.nav-logo {\n  font-family: 'Playfair Display', serif;\n  font-size: 1.5rem;\n  font-weight: 700;\n  color: var(--text-primary);\n  letter-spacing: 2px;\n  position: relative;\n}\n\n.nav-logo span {\n  color: var(--accent);\n  font-style: italic;\n}\n\n.nav-links {\n  display: flex;\n  align-items: center;\n  gap: 35px;\n  list-style: none;\n}\n\n.nav-links a {\n  font-family: 'EB Garamond', serif;\n  font-size: 0.95rem;\n  color: var(--text-secondary);\n  letter-spacing: 2px;\n  text-transform: uppercase;\n  position: relative;\n  padding: 5px 0;\n  transition: color 0.3s ease;\n}\n\n.nav-links a::after {\n  content: '';\n  position: absolute;\n  bottom: 0;\n  left: 0;\n  width: 0;\n  height: 1px;\n  background: var(--accent);\n  transition: width 0.4s ease;\n}\n\n.nav-links a:hover {\n  color: var(--accent-light);\n}\n\n.nav-links a:hover::after {\n  width: 100%;\n}\n\n.nav-toggle {\n  display: none;\n  flex-direction: column;\n  gap: 5px;\n  cursor: pointer;\n  padding: 5px;\n  z-index: 1001;\n}\n\n.nav-toggle span {\n  width: 28px;\n  height: 2px;\n  background: var(--text-primary);\n  transition: all 0.3s ease;\n  transform-origin: center;\n}\n\n.nav-toggle.active span:nth-child(1) {\n  transform: rotate(45deg) translate(5px, 5px);\n}\n\n.nav-toggle.active span:nth-child(2) {\n  opacity: 0;\n}\n\n.nav-toggle.active span:nth-child(3) {\n  transform: rotate(-45deg) translate(5px, -5px);\n}\n\n/* ═══════════════════════════════════════════════════\n   THEME SWITCHER PANEL\n   ═══════════════════════════════════════════════════ */\n.theme-switcher {\n  position: fixed;\n  right: -320px;\n  top: 50%;\n  transform: translateY(-50%);\n  width: 300px;\n  background: var(--card-bg);\n  backdrop-filter: blur(30px);\n  -webkit-backdrop-filter: blur(30px);\n  border: 1px solid var(--border);\n  border-right: none;\n  border-radius: 20px 0 0 20px;\n  padding: 30px 25px;\n  z-index: 999;\n  transition: right 0.5s cubic-bezier(0.4, 0, 0.2, 1);\n  box-shadow: var(--shadow);\n}\n\n.theme-switcher.open {\n  right: 0;\n}\n\n.theme-switcher-toggle {\n  position: absolute;\n  left: -44px;\n  top: 50%;\n  transform: translateY(-50%);\n  width: 44px;\n  height: 44px;\n  background: var(--card-bg);\n  backdrop-filter: blur(30px);\n  border: 1px solid var(--border);\n  border-right: none;\n  border-radius: 12px 0 0 12px;\n  cursor: pointer;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  font-size: 1.2rem;\n  color: var(--text-primary);\n  transition: all 0.3s ease;\n}\n\n.theme-switcher-toggle:hover {\n  background: var(--accent);\n  color: var(--bg-primary);\n}\n\n.theme-switcher h3 {\n  font-family: 'Playfair Display', serif;\n  font-size: 1.1rem;\n  color: var(--text-primary);\n  margin-bottom: 20px;\n  letter-spacing: 1px;\n}\n\n.theme-option {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  padding: 10px 12px;\n  border-radius: 10px;\n  cursor: pointer;\n  transition: all 0.3s ease;\n  margin-bottom: 6px;\n  border: 1px solid transparent;\n}\n\n.theme-option:hover {\n  background: var(--brush-stroke);\n  border-color: var(--border);\n}\n\n.theme-option.active {\n  background: var(--brush-stroke);\n  border-color: var(--accent);\n}\n\n.theme-colors {\n  display: flex;\n  gap: 3px;\n  width: 36px;\n  height: 24px;\n  border-radius: 4px;\n  overflow: hidden;\n  flex-shrink: 0;\n}\n\n.theme-colors span {\n  flex: 1;\n}\n\n.theme-option-name {\n  font-family: 'EB Garamond', serif;\n  font-size: 0.9rem;\n  color: var(--text-secondary);\n  letter-spacing: 0.5px;\n}\n\n/* ═══════════════════════════════════════════════════\n   HERO SECTION\n   ═══════════════════════════════════════════════════ */\n.hero {\n  min-height: 100vh;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  position: relative;\n  overflow: hidden;\n  background: var(--gradient-hero);\n}\n\n.hero-bg-art {\n  position: absolute;\n  top: 0;\n  left: 0;\n  width: 100%;\n  height: 100%;\n  opacity: 0.08;\n  pointer-events: none;\n}\n\n.hero-bg-art svg {\n  width: 100%;\n  height: 100%;\n}\n\n.hero-canvas {\n  position: absolute;\n  top: 0;\n  left: 0;\n  width: 100%;\n  height: 100%;\n  pointer-events: none;\n}\n\n.hero-content {\n  position: relative;\n  z-index: 2;\n  text-align: center;\n  padding: 0 20px;\n  max-width: 900px;\n}\n\n.hero-subtitle {\\n  font-family: 'EB Garamond', serif;\n  font-size: 0.9rem;\n  letter-spacing: 6px;\n  text-transform: uppercase;\n  color: var(--accent);\n  margin-bottom: 25px;\n  opacity: 0;\n  transform: translateY(20px);\n  animation: heroFadeUp 1s ease 0.5s forwards;\n}\n\n.hero-title {\n  font-family: 'Playfair Display', serif;\n  font-size: clamp(3rem, 8vw, 7rem);\n  font-weight: 900;\n  line-height: 1.05;\n  color: var(--text-primary);\n  margin-bottom: 20px;\n  opacity: 0;\n  transform: translateY(30px);\n  animation: heroFadeUp 1s ease 0.8s forwards;\n}\n\n.hero-title em {\n  font-style: italic;\n  color: var(--accent);\n  font-weight: 400;\n}\n\n.hero-tagline {\n  font-family: 'Cormorant Garamond', serif;\n  font-size: clamp(1.1rem, 2.5vw, 1.5rem);\n  font-weight: 300;\n  color: var(--text-secondary);\n  font-style: italic;\n  margin-bottom: 40px;\n  opacity: 0;\n  transform: translateY(20px);\n  animation: heroFadeUp 1s ease 1.1s forwards;\n}\n\n.hero-cta {\n  display: inline-flex;\n  align-items: center;\n  gap: 12px;\n  padding: 16px 40px;\n  border: 1px solid var(--accent);\n  color: var(--accent);\n  font-family: 'EB Garamond', serif;\n  font-size: 0.95rem;\n  letter-spacing: 3px;\n  text-transform: uppercase;\n  border-radius: 0;\n  transition: all 0.4s ease;\n  opacity: 0;\n  transform: translateY(20px);\n  animation: heroFadeUp 1s ease 1.4s forwards;\n  position: relative;\n  overflow: hidden;\n}\n\n.hero-cta::before {\n  content: '';\n  position: absolute;\n  top: 0;\n  left: -100%;\n  width: 100%;\n  height: 100%;\n  background: var(--accent);\n  transition: left 0.4s ease;\n  z-index: -1;\n}\n\n.hero-cta:hover::before {\n  left: 0;\n}\n\n.hero-cta:hover {\n  color: var(--bg-primary);\n}\n\n.hero-scroll {\n  position: absolute;\n  bottom: 40px;\n  left: 50%;\n  transform: translateX(-50%);\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 8px;\n  color: var(--text-muted);\n  font-size: 0.75rem;\n  letter-spacing: 3px;\n  text-transform: uppercase;\n  opacity: 0;\n  animation: heroFadeUp 1s ease 1.8s forwards;\n}\n\n.hero-scroll-line {\n  width: 1px;\n  height: 50px;\n  background: linear-gradient(to bottom, var(--accent), transparent);\n  animation: scrollLine 2s ease-in-out infinite;\n}\n\n@keyframes scrollLine {\n  0%, 100% { transform: scaleY(1); opacity: 1; }\n  50% { transform: scaleY(0.5); opacity: 0.3; }\n}\n\n@keyframes heroFadeUp {\n  to { opacity: 1; transform: translateY(0); }\n}\n\n/* ═══════════════════════════════════════════════════\n   SECTION COMMON\n   ═══════════════════════════════════════════════════ */\n.section {\n  padding: 120px 40px;\n  position: relative;\n}\n\n.section-header {\n  text-align: center;\n  margin-
